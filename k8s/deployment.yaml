apiVersion: apps/v1
kind: Deployment
metadata:
  name: basic-gitops-app
  namespace: gitops-basic
  labels:
    app: basic-gitops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: basic-gitops-app
  template:
    metadata:
      labels:
        app: basic-gitops-app
    spec:
      containers:
        - name: basic-gitops-app
          # GitHub Actions replaces this tag after the first successful build.
          image: abdullahmasoodx/basic-gitops-app:initial
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_VERSION
              value: "v1"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
