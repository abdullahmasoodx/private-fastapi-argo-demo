name: Build, Push and Update GitOps Manifest

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/ci.yaml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gitops-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: basic-gitops-app

jobs:
  build-push-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate short image tag
        shell: bash
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          provenance: true
          sbom: true

      - name: Update Kubernetes image tag
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          deployment = Path("k8s/deployment.yaml")
          content = deployment.read_text()

          new_image = (
              f"{os.environ['DOCKERHUB_USERNAME']}/"
              f"{os.environ['IMAGE_NAME']}:"
              f"{os.environ['IMAGE_TAG']}"
          )

          updated, count = re.subn(
              r"(?m)^(\s*image:\s*).+$",
              rf"\g<1>{new_image}",
              content,
              count=1,
          )

          if count != 1:
              raise RuntimeError("Could not find exactly one image field")

          deployment.write_text(updated)
          print(f"Updated deployment image to: {new_image}")
          PY

      - name: Commit updated manifest
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/deployment.yaml

          if git diff --cached --quiet; then
            echo "No Kubernetes manifest changes to commit."
          else
            git commit -m "chore: deploy image ${IMAGE_TAG} [skip ci]"
            git push
          fi
