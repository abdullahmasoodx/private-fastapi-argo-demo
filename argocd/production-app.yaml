apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: private-fastapi-demo-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/private-fastapi-argo-demo.git
    targetRevision: main
    path: k8s/production
  destination:
    server: https://kubernetes.default.svc
    namespace: private-demo-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
